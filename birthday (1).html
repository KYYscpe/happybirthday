<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #87CEEB;
    --sky-light: #c8e8f8;
    --sky-mid: #5bb8e8;
    --sky-deep: #1565C0;
    --sky-bg: #87CEEB;
    --blue-dark: #0D47A1;
    --blue-mid: #1565C0;
    --blue-text: #0D47A1;
    --pink: #f9b8d4;
    --pink-deep: #f07aab;
    --pink-soft: #fde0ee;
    --lavender: #d8b8f9;
    --white: #ffffff;
    --text-dark: #0D47A1;
    --text-mid: #1565C0;
    --gold: #f5c842;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Fredoka', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background: #87CEEB;
    cursor: default;
  }

  /* ======= FLOATING BACKGROUND PARTICLES ======= */
  .bg-particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-particles span {
    position: absolute;
    border-radius: 50%;
    opacity: 0.18;
    animation: floatBg linear infinite;
  }
  @keyframes floatBg {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.18; }
    90% { opacity: 0.18; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  /* ======= SCREENS ======= */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 10;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(30px);
  }

  /* ======= SCREEN 1: CODE QUEST ======= */
  #screen-code {
    text-align: center;
    padding: 30px;
  }
  .code-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--blue-dark);
    line-height: 1.2;
    margin-bottom: 8px;
    animation: titleEntrance 1s cubic-bezier(.22,1,.36,1) both;
  }
  .code-subtitle {
    font-size: 1.15rem;
    color: var(--blue-mid);
    margin-bottom: 40px;
    font-weight: 600;
    letter-spacing: 0.03em;
    animation: titleEntrance 1s 0.2s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes titleEntrance {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .code-display {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 36px;
    animation: titleEntrance 1s 0.4s cubic-bezier(.22,1,.36,1) both;
  }
  .code-digit {
    width: 80px; height: 96px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    border: 2.5px solid rgba(21,101,192,0.4);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: 3rem;
    font-weight: 900;
    color: var(--blue-mid);
    box-shadow: 0 8px 32px rgba(21,101,192,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    position: relative; overflow: hidden;
  }
  .code-digit::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, transparent 60%);
    border-radius: 18px;
  }
  .code-digit.filled {
    color: var(--blue-dark);
    border-color: var(--blue-dark);
    box-shadow: 0 8px 32px rgba(13,71,161,0.3), inset 0 1px 0 rgba(255,255,255,0.8);
    transform: scale(1.05);
  }
  .code-digit.shake { animation: shake 0.4s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px) rotate(-2deg); }
    40% { transform: translateX(8px) rotate(2deg); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .numpad {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    max-width: 340px; width: 100%;
    margin: 0 auto;
    animation: titleEntrance 1s 0.6s cubic-bezier(.22,1,.36,1) both;
  }
  .num-btn {
    height: 58px;
    background: rgba(255,255,255,0.65);
    backdrop-filter: blur(8px);
    border: 2px solid rgba(21,101,192,0.3);
    border-radius: 16px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.4rem; font-weight: 700;
    color: var(--blue-dark);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 4px 16px rgba(21,101,192,0.1);
    position: relative; overflow: hidden;
  }
  .num-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(135,206,235,0.5), rgba(255,255,255,0.5));
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 14px;
  }
  .num-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 24px rgba(21,101,192,0.25); }
  .num-btn:hover::before { opacity: 1; }
  .num-btn:active { transform: scale(0.95); }
  .del-btn { background: rgba(249,184,212,0.4); border-color: rgba(240,122,171,0.4); color: #c0507a; font-size: 1rem; }

  .hint-text {
    margin-top: 20px;
    font-size: 0.95rem; color: var(--blue-mid); font-weight: 500;
    opacity: 0; transition: opacity 0.5s;
    animation: titleEntrance 1s 0.8s cubic-bezier(.22,1,.36,1) both;
  }
  .hint-text.visible { opacity: 1; }
  .code-wrong {
    color: #c0507a; font-weight: 700;
    margin-top: 12px; opacity: 0;
    transition: opacity 0.3s; min-height: 24px;
  }
  .code-wrong.show { opacity: 1; }

  /* ======= SCREEN 2: HEART GAME ======= */
  #screen-game { flex-direction: column; align-items: center; }
  #game-canvas-wrap {
    position: relative;
    width: min(420px, 95vw); height: min(580px, 85vh);
    overflow: hidden; border-radius: 24px;
    background: linear-gradient(180deg, rgba(135,206,235,0.2) 0%, rgba(255,255,255,0.1) 100%);
  }
  #game-canvas { width: 100%; height: 100%; display: block; }
  .score-display {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
    border-radius: 50px; padding: 8px 28px;
    font-family: 'Fredoka One', cursive; font-size: 1.5rem; font-weight: 700;
    color: var(--blue-dark);
    border: 2px solid rgba(21,101,192,0.3);
    box-shadow: 0 4px 20px rgba(21,101,192,0.15);
    white-space: nowrap; z-index: 20;
  }
  .score-display span { color: var(--blue-mid); }
  .game-title-ui {
    font-family: 'Fredoka One', cursive; font-size: 1.15rem;
    color: var(--blue-dark); margin-bottom: 10px; font-weight: 600; letter-spacing: 0.03em;
  }

  /* ======= SCREEN 3+: MESSAGES ======= */
  #screen-messages {
    flex-direction: column; justify-content: center;
    align-items: center; padding: 24px 24px; text-align: center;
  }
  .msg-content { max-width: 620px; width: 100%; }

  /* CHARACTER */
  .char-wrap {
    display: flex; justify-content: center; align-items: flex-end;
    margin-bottom: 12px; height: 110px;
    opacity: 0; transform: translateY(18px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .char-wrap.visible { opacity: 1; transform: translateY(0); }

  /* Char 1 — Blue blob cat (bouncing) */
  @keyframes blobBounce {
    0%,100% { transform: scaleY(1) scaleX(1) translateY(0); }
    40% { transform: scaleY(1.12) scaleX(0.92) translateY(-14px); }
    60% { transform: scaleY(0.9) scaleX(1.1) translateY(2px); }
  }
  @keyframes blobEarWiggle {
    0%,100% { transform: rotate(0deg); }
    40% { transform: rotate(-12deg); }
    60% { transform: rotate(8deg); }
  }
  @keyframes eyeBlink {
    0%,90%,100% { transform: scaleY(1); }
    95% { transform: scaleY(0.05); }
  }
  .char1 { animation: blobBounce 1.1s cubic-bezier(.36,.07,.19,.97) infinite; transform-origin: bottom center; }
  .char1-ear { animation: blobEarWiggle 1.1s ease infinite; transform-origin: bottom center; }
  .char1-eye { animation: eyeBlink 3s ease infinite; transform-origin: center; }

  /* Char 2 — Star girl (spinning sparkle) */
  @keyframes starSpin { 0% { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.15); } 100% { transform: rotate(360deg) scale(1); } }
  @keyframes starFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes starWink { 0%,85%,100% { transform: scaleY(1); } 92% { transform: scaleY(0.05); } }
  .char2 { animation: starFloat 1.4s ease-in-out infinite; }
  .char2-star { animation: starSpin 2s linear infinite; transform-origin: 50% 50%; }
  .char2-eye { animation: starWink 4s ease infinite; transform-origin: center; }

  /* Char 3 — Pink bunny (ear flap) */
  @keyframes bunnyHop { 0%,100% { transform: translateY(0); } 35% { transform: translateY(-16px); } 55% { transform: translateY(-8px); } }
  @keyframes earFlap { 0%,100% { transform: rotate(0deg); } 35% { transform: rotate(-20deg); } 60% { transform: rotate(10deg); } }
  @keyframes earFlap2 { 0%,100% { transform: rotate(0deg); } 35% { transform: rotate(20deg); } 60% { transform: rotate(-10deg); } }
  .char3 { animation: bunnyHop 1.2s cubic-bezier(.36,.07,.19,.97) infinite; transform-origin: bottom; }
  .char3-earL { animation: earFlap 1.2s ease infinite; transform-origin: 50% 100%; }
  .char3-earR { animation: earFlap2 1.2s ease infinite; transform-origin: 50% 100%; }
  .char3-eye { animation: eyeBlink 3.5s ease infinite; transform-origin: center; }

  /* Char 4 — Yellow chick (wobble) */
  @keyframes chickWobble { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
  @keyframes wingFlap { 0%,100% { transform: rotate(0deg) scaleX(1); } 40% { transform: rotate(-25deg) scaleX(0.85); } 70% { transform: rotate(15deg) scaleX(0.9); } }
  .char4 { animation: chickWobble 0.9s ease-in-out infinite; transform-origin: bottom center; }
  .char4-wingL { animation: wingFlap 0.9s ease-in-out infinite; transform-origin: right center; }
  .char4-wingR { animation: wingFlap 0.9s 0.45s ease-in-out infinite; transform-origin: left center; }

  /* Char 5 — Ghost (float + sway) */
  @keyframes ghostFloat { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-14px) rotate(3deg); } }
  @keyframes ghostTail { 0%,100% { d: path("M20,80 Q10,90 20,100 Q30,90 40,100 Q50,90 60,100 Q70,90 80,100"); } 50% { d: path("M20,80 Q15,95 25,102 Q35,92 45,102 Q55,92 65,102 Q75,95 80,100"); } }
  @keyframes ghostEyeHappy { 0%,85%,100% { transform: scaleY(1); } 92% { transform: scaleY(0.05); } }
  .char5 { animation: ghostFloat 1.6s ease-in-out infinite; }
  .char5-eye { animation: ghostEyeHappy 4s ease infinite; transform-origin: center; }

  /* Char 6 — Rainbow bear (dance) */
  @keyframes bearDance { 0%,100% { transform: rotate(-5deg) translateY(0); } 25% { transform: rotate(5deg) translateY(-8px); } 50% { transform: rotate(-3deg) translateY(-4px); } 75% { transform: rotate(4deg) translateY(-6px); } }
  @keyframes bearHandL { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-30deg); } }
  @keyframes bearHandR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(30deg); } }
  @keyframes bearBlink { 0%,80%,100% { transform: scaleY(1); } 88% { transform: scaleY(0.05); } }
  .char6 { animation: bearDance 0.9s ease-in-out infinite; transform-origin: bottom center; }
  .char6-armL { animation: bearHandL 0.9s ease-in-out infinite; transform-origin: right top; }
  .char6-armR { animation: bearHandR 0.9s 0.45s ease-in-out infinite; transform-origin: left top; }
  .char6-eye { animation: bearBlink 3s ease infinite; transform-origin: center; }

  .msg-text {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.4rem, 3.5vw, 2.1rem);
    font-weight: 400;
    color: var(--blue-dark);
    line-height: 1.65;
    min-height: 140px;
    display: block;
    text-align: center;
    text-shadow: 0 2px 8px rgba(13,71,161,0.1);
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg-cursor {
    display: inline-block;
    width: 3px; height: 1.1em;
    background: var(--blue-mid);
    border-radius: 2px; vertical-align: middle; margin-left: 2px;
    animation: cursorBlink 0.7s step-end infinite;
  }
  @keyframes cursorBlink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .msg-deco {
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem; color: var(--blue-mid);
    font-weight: 600; letter-spacing: 0.15em;
    text-transform: uppercase; margin-bottom: 20px;
    opacity: 0; animation: none;
  }
  .msg-deco.visible { animation: decoIn 0.6s cubic-bezier(.22,1,.36,1) both; }
  @keyframes decoIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .next-btn {
    margin-top: 40px; padding: 16px 44px;
    background: linear-gradient(135deg, var(--blue-mid), #1976D2);
    border: none; border-radius: 50px;
    font-family: 'Fredoka', sans-serif;
    font-size: 1.15rem; font-weight: 700;
    color: white; cursor: pointer;
    transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 8px 32px rgba(13,71,161,0.35);
    letter-spacing: 0.03em;
    position: relative; overflow: hidden;
    opacity: 0; transform: translateY(20px);
  }
  .next-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    border-radius: 50px;
  }
  .next-btn.visible {
    opacity: 1; transform: translateY(0);
    transition: opacity 0.6s 0.4s ease, transform 0.6s 0.4s cubic-bezier(.22,1,.36,1), background 0.3s, box-shadow 0.3s;
  }
  .next-btn:hover { transform: translateY(-4px) scale(1.05) !important; box-shadow: 0 16px 48px rgba(13,71,161,0.4); }
  .next-btn:active { transform: scale(0.96) !important; }

  /* YES / NO BUTTONS */
  .yn-wrap {
    display: flex; gap: 20px; justify-content: center;
    margin-top: 36px;
    opacity: 0; transform: translateY(20px);
    transition: opacity 0.6s 0.4s ease, transform 0.6s 0.4s cubic-bezier(.22,1,.36,1);
  }
  .yn-wrap.visible { opacity: 1; transform: translateY(0); }

  .yn-btn {
    padding: 14px 44px;
    border: none; border-radius: 50px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem; font-weight: 400;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    position: relative; overflow: hidden;
    letter-spacing: 0.04em;
  }
  .yn-btn.yes {
    background: linear-gradient(135deg, #1565C0, #1976D2);
    color: white;
    box-shadow: 0 8px 28px rgba(21,101,192,0.4);
  }
  .yn-btn.no {
    background: rgba(255,255,255,0.7);
    color: var(--blue-dark);
    border: 2.5px solid rgba(21,101,192,0.35);
    box-shadow: 0 4px 16px rgba(21,101,192,0.1);
  }
  .yn-btn:hover { transform: translateY(-3px) scale(1.07); }
  .yn-btn:active { transform: scale(0.94); }

  /* ANGRY EMOJI OVERLAY */
  .angry-overlay {
    position: fixed; inset: 0; z-index: 500;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; opacity: 0;
  }
  .angry-overlay.show { animation: angryPop 1.8s ease forwards; }
  @keyframes angryPop {
    0% { opacity: 0; transform: scale(0.3); }
    20% { opacity: 1; transform: scale(1.3); }
    40% { transform: scale(0.9); }
    60% { transform: scale(1.1); }
    80% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.8); }
  }
  .angry-face {
    font-size: 8rem;
    filter: drop-shadow(0 8px 32px rgba(255,80,80,0.5));
    animation: angryShake 0.15s ease infinite;
  }
  @keyframes angryShake {
    0%,100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  /* Progress dots */
  .progress-dots {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 24px; opacity: 0;
  }
  .progress-dots.visible { opacity: 1; transition: opacity 0.5s; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(21,101,192,0.25);
    transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  .dot.active { background: var(--blue-mid); transform: scale(1.4); }
  .dot.done { background: var(--blue-dark); }

  /* ======= FINAL SCREEN ======= */
  #screen-final {
    flex-direction: column; justify-content: center;
    align-items: center; padding: 40px 24px; text-align: center;
  }
  .final-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.5rem, 7vw, 5rem);
    font-weight: 400;
    background: linear-gradient(135deg, var(--blue-dark), #1976D2, var(--sky-mid));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1; margin-bottom: 16px;
    opacity: 0; animation: none;
  }
  .final-title.visible { animation: finalIn 1.2s cubic-bezier(.22,1,.36,1) both; }
  @keyframes finalIn {
    from { opacity: 0; transform: scale(0.7) rotate(-5deg); }
    to { opacity: 1; transform: scale(1) rotate(0); }
  }
  .final-sub {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.2rem; color: var(--blue-mid);
    font-weight: 600; letter-spacing: 0.04em; opacity: 0;
  }
  .final-sub.visible { animation: titleEntrance 0.8s 0.5s cubic-bezier(.22,1,.36,1) both; }
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 50; overflow: hidden; }

  /* Music button */
  .music-btn {
    position: fixed; bottom: 24px; right: 24px; z-index: 400;
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(21,101,192,0.3);
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    box-shadow: 0 4px 20px rgba(21,101,192,0.2);
    transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    opacity: 0; pointer-events: none;
  }
  .music-btn.visible { opacity: 1; pointer-events: all; }
  .music-btn:hover { transform: scale(1.15); }
  .music-btn.playing { animation: musicPulse 1.5s ease infinite; }
  @keyframes musicPulse {
    0%,100% { box-shadow: 0 4px 20px rgba(21,101,192,0.2); }
    50% { box-shadow: 0 4px 32px rgba(21,101,192,0.5), 0 0 0 8px rgba(21,101,192,0.1); }
  }

  /* Transitions */
  .sound-ring {
    position: fixed; border-radius: 50%;
    border: 3px solid var(--blue-mid); opacity: 0;
    pointer-events: none; z-index: 200;
    animation: soundRing 0.6s ease-out forwards;
  }
  @keyframes soundRing {
    from { opacity: 0.7; transform: scale(0.2); }
    to { opacity: 0; transform: scale(1.5); }
  }
  .sparkle {
    position: fixed; pointer-events: none; z-index: 300;
    animation: sparkleAnim 0.8s ease forwards;
  }
  @keyframes sparkleAnim {
    0% { opacity: 1; transform: scale(0) rotate(0); }
    50% { opacity: 1; transform: scale(1) rotate(180deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
  }
</style>
</head>
<body>

<div class="bg-particles" id="bgParticles"></div>

<!-- Music button -->
<button class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</button>

<!-- Angry overlay -->
<div class="angry-overlay" id="angryOverlay">
  <div class="angry-face">😡</div>
</div>

<!-- Smile overlay -->
<div class="angry-overlay" id="smileOverlay">
  <div class="angry-face" style="animation:none;">😊</div>
</div>

<!-- SCREEN 1: Code Quest -->
<div class="screen" id="screen-code">
  <div class="code-title">Selamat Datang</div>
  <div class="code-subtitle">Masukkan tanggal ulang tahunmu untuk melanjutkan</div>
  <div class="code-display">
    <div class="code-digit" id="digit-0">_</div>
    <div class="code-digit" id="digit-1">_</div>
  </div>
  <div class="numpad">
    <button class="num-btn" onclick="pressNum('1')">1</button>
    <button class="num-btn" onclick="pressNum('2')">2</button>
    <button class="num-btn" onclick="pressNum('3')">3</button>
    <button class="num-btn" onclick="pressNum('4')">4</button>
    <button class="num-btn" onclick="pressNum('5')">5</button>
    <button class="num-btn" onclick="pressNum('6')">6</button>
    <button class="num-btn" onclick="pressNum('7')">7</button>
    <button class="num-btn" onclick="pressNum('8')">8</button>
    <button class="num-btn" onclick="pressNum('9')">9</button>
    <button class="num-btn" onclick="pressNum('0')">0</button>
    <button class="num-btn del-btn" onclick="deleteNum()">⌫</button>

// ============================================
// AUDIO — MP3 from base64
// ============================================
let bgAudio = null;
let musicPlaying = false;

function initMusic() {
  if (bgAudio) return;
  bgAudio = new Audio('data:audio/mp3;base64,' + SONG_DATA);
  bgAudio.loop = true;
  bgAudio.volume = 0.55;
}

function startMusic() {
  initMusic();
  bgAudio.play().then(()=>{
    musicPlaying = true;
    const btn = document.getElementById('musicBtn');
    btn.textContent = '🎵';
    btn.classList.add('playing');
    btn.classList.add('visible');
  }).catch(()=>{});
}

function toggleMusic() {
  initMusic();
  if (musicPlaying) {
    bgAudio.pause();
    musicPlaying = false;
    document.getElementById('musicBtn').classList.remove('playing');
    document.getElementById('musicBtn').textContent = '🔇';
  } else {
    bgAudio.play();
    musicPlaying = true;
    document.getElementById('musicBtn').classList.add('playing');
    document.getElementById('musicBtn').textContent = '🎵';
  }
}

(function initBg() {
  const wrap = document.getElementById('bgParticles');
  const colors = ['#ffffff','#dff2fd','#b8e4f9','#1565C0','#1976D2'];
  for (let i = 0; i < 18; i++) {

    const size = 20 + Math.random() * 60;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${8+Math.random()*14}s;animation-delay:${-Math.random()*15}s;`;
    wrap.appendChild(s);
  }
})();

// ============================================
// WEB AUDIO TONES
// ============================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type='sine', dur=0.15, vol=0.3, delay=0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e){}
}
function playChime() { [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.3,0.25,i*0.1)); }
function playWrong() { playTone(200,'sawtooth',0.2,0.2); playTone(180,'sawtooth',0.2,0.15,0.12); }
function playClick() { playTone(880,'sine',0.08,0.15); }
function playHeartCatch() { playTone(523,'sine',0.12,0.3); playTone(659,'sine',0.12,0.25,0.08); }
function playSuccess() { [523,659,784,1047,1319].forEach((f,i)=>playTone(f,'sine',0.4,0.3,i*0.08)); }
function playNextMsg() { playTone(784,'sine',0.15,0.2); playTone(987,'sine',0.15,0.2,0.1); }

// ============================================
// SCREEN 1: CODE QUEST
// ============================================
let codeInput = '';
let wrongCount = 0;

function pressNum(n) {
  if (codeInput.length >= 2) return;
  playClick();
  createSparkleAt(event.clientX, event.clientY);
  codeInput += n;
  updateCodeDisplay();
  if (codeInput.length === 2) setTimeout(checkCode, 300);
}
function deleteNum() {
  if (!codeInput.length) return;
  playTone(440,'sine',0.08,0.1);
  codeInput = codeInput.slice(0,-1);
  updateCodeDisplay();
}
function updateCodeDisplay() {
  for (let i = 0; i < 2; i++) {
    const d = document.getElementById('digit-'+i);
    if (codeInput[i]) { d.textContent = codeInput[i]; d.classList.add('filled'); }
    else { d.textContent = '_'; d.classList.remove('filled'); }
  }
}
function checkCode() {
  if (codeInput === '20') {
    playSuccess();
    startMusic();
    const st = document.createElement('style');
    st.textContent = `@keyframes successPulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}`;
    document.head.appendChild(st);
    document.getElementById('digit-0').style.animation = 'successPulse 0.5s ease both';
    document.getElementById('digit-1').style.animation = 'successPulse 0.5s 0.1s ease both';
    setTimeout(()=>transitionTo('screen-code','screen-game'), 900);
  } else {
    wrongCount++;
    playWrong();
    document.getElementById('digit-0').classList.add('shake');
    document.getElementById('digit-1').classList.add('shake');
    setTimeout(()=>{ document.getElementById('digit-0').classList.remove('shake'); document.getElementById('digit-1').classList.remove('shake'); }, 500);
    const w = document.getElementById('codeWrong');
    w.classList.add('show'); setTimeout(()=>w.classList.remove('show'), 2000);
    codeInput = ''; updateCodeDisplay();
    if (wrongCount >= 2) document.getElementById('hintText').classList.add('visible');
  }
}

// SCREEN 2: HEART GAME
// ============================================
const canvas = document.getElementById('game-canvas');
const ctx2 = canvas.getContext('2d');
let score = 0, hearts = [], planes = [], particles = [], animId = null, gameActive = false;

function resizeCanvas() {
  const wrap = document.getElementById('game-canvas-wrap');
  canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight;
}
function drawHeart(cx, cy, size, color, alpha=1, rotation=0) {
  ctx2.save();
  ctx2.translate(cx, cy); ctx2.rotate(rotation); ctx2.globalAlpha = alpha;
  ctx2.beginPath();
  for (let t = 0; t <= Math.PI*2; t += 0.05) {
    const x = size*16*Math.pow(Math.sin(t),3)/16;
    const y = -size*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/16;
    if (t===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
  }
  ctx2.closePath();
  const grad = ctx2.createRadialGradient(-size*0.2,-size*0.2,0,0,0,size);
  grad.addColorStop(0, lightenColor(color,40)); grad.addColorStop(1, color);
  ctx2.fillStyle = grad; ctx2.shadowColor = color; ctx2.shadowBlur = 10; ctx2.fill();
  ctx2.restore();
}
function lightenColor(hex, amt) {
  let r=parseInt(hex.slice(1,3),16)+amt, g=parseInt(hex.slice(3,5),16)+amt, b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function drawPaperPlane(cx, cy, size, angle, color, alpha=1) {
  ctx2.save(); ctx2.translate(cx,cy); ctx2.rotate(angle); ctx2.globalAlpha = alpha;
  ctx2.beginPath();
  ctx2.moveTo(size,0); ctx2.lineTo(-size,-size*0.5); ctx2.lineTo(-size*0.5,0); ctx2.lineTo(-size,size*0.5); ctx2.closePath();
  const grad = ctx2.createLinearGradient(-size,0,size,0);
  grad.addColorStop(0,color); grad.addColorStop(1,lightenColor(color,60));
  ctx2.fillStyle = grad; ctx2.fill();
  ctx2.beginPath(); ctx2.moveTo(-size*0.5,0); ctx2.lineTo(-size,size*0.5); ctx2.lineTo(-size*0.2,size*0.1); ctx2.closePath();
  ctx2.fillStyle = color; ctx2.globalAlpha = alpha*0.5; ctx2.fill(); ctx2.restore();
}

class Heart {
  constructor() {
    this.x = 30+Math.random()*(canvas.width-60); this.y = -30;
    this.size = 14+Math.random()*10;
    this.speed = 1.2+Math.random()*1.5;
    const cols = ['#1565C0','#1976D2','#42A5F5','#0D47A1','#2196F3','#f07aab','#f9b8d4'];
    this.color = cols[Math.floor(Math.random()*cols.length)];
    this.sway = (Math.random()-0.5)*1.5; this.swaySpeed = 0.02+Math.random()*0.02;
    this.swayT = Math.random()*Math.PI*2; this.rotation = 0;
    this.rotSpeed = (Math.random()-0.5)*0.04; this.scale = 1;
    this.pulse = Math.random()*Math.PI*2; this.alpha = 0; this.fadeIn = true;
  }
  update() {
    this.y += this.speed; this.swayT += this.swaySpeed;
    this.x += Math.sin(this.swayT)*this.sway; this.rotation += this.rotSpeed;
    this.pulse += 0.08; this.scale = 1+Math.sin(this.pulse)*0.08;
    if (this.fadeIn && this.alpha < 1) this.alpha = Math.min(1, this.alpha+0.05);
  }
  draw() { drawHeart(this.x, this.y, this.size*this.scale, this.color, this.alpha, this.rotation); }
  isOut() { return this.y > canvas.height+40; }
}
class PaperPlane {
  constructor() {
    const side = Math.random()<0.5?-1:1;
    this.x = side<0?-40:canvas.width+40; this.y = 60+Math.random()*(canvas.height-120);
    this.vx = side*(1.5+Math.random()*2); this.vy = (Math.random()-0.5)*1.2;
    this.angle = Math.atan2(this.vy,this.vx);
    const cols = ['#ffffff','#dff2fd','#b8e4f9'];
    this.color = cols[Math.floor(Math.random()*cols.length)];
    this.size = 16+Math.random()*10; this.alpha = 0.7+Math.random()*0.3; this.trail = [];
  }
  update() {
    this.trail.push({x:this.x,y:this.y}); if (this.trail.length>12) this.trail.shift();
    this.x += this.vx; this.y += this.vy; this.vy += 0.01;
    this.angle = Math.atan2(this.vy,this.vx);
  }
  draw() {
    for (let i=0;i<this.trail.length;i++) {
      const a=(i/this.trail.length)*0.15*this.alpha;
      ctx2.beginPath(); ctx2.arc(this.trail[i].x,this.trail[i].y,2,0,Math.PI*2);
      ctx2.fillStyle=this.color; ctx2.globalAlpha=a; ctx2.fill();
    }
    ctx2.globalAlpha=1;
    drawPaperPlane(this.x,this.y,this.size,this.angle,this.color,this.alpha);
  }
  isOut() { return this.x<-100||this.x>canvas.width+100||this.y>canvas.height+100; }
}
class Particle {
  constructor(x,y,color) {
    this.x=x; this.y=y;
    this.vx=(Math.random()-0.5)*6; this.vy=-2-Math.random()*4;
    this.color=color; this.alpha=1; this.size=3+Math.random()*4;
    this.isHeart=Math.random()<0.5; this.rotation=Math.random()*Math.PI*2;
    this.rotSpeed=(Math.random()-0.5)*0.1;
  }
  update() { this.x+=this.vx; this.y+=this.vy; this.vy+=0.2; this.alpha-=0.025; this.rotation+=this.rotSpeed; this.vx*=0.98; }
  draw() {
    if (this.alpha<=0) return;
    if (this.isHeart) drawHeart(this.x,this.y,this.size*0.8,this.color,this.alpha,this.rotation);
    else {
      ctx2.save(); ctx2.translate(this.x,this.y); ctx2.rotate(this.rotation);
      ctx2.globalAlpha=this.alpha; ctx2.fillStyle=this.color;
      ctx2.fillRect(-this.size/2,-this.size/2,this.size,this.size); ctx2.restore();
    }
  }
  isDead() { return this.alpha<=0; }
}
function spawnParticles(x,y,color) {
  const pCols=[color,'#1976D2','#b8e4f9','#f9b8d4','#ffffff'];
  for (let i=0;i<16;i++) particles.push(new Particle(x,y,pCols[Math.floor(Math.random()*pCols.length)]));
}
function gameLoop() {
  if (!gameActive) return;
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  const bg=ctx2.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,'rgba(135,206,235,0.12)'); bg.addColorStop(1,'rgba(255,255,255,0.05)');
  ctx2.fillStyle=bg; ctx2.fillRect(0,0,canvas.width,canvas.height);
  if (Math.random()<0.04+score*0.002) hearts.push(new Heart());
  if (Math.random()<0.008) planes.push(new PaperPlane());
  planes=planes.filter(p=>{p.update();p.draw();return !p.isOut();});
  particles=particles.filter(p=>{p.update();p.draw();return !p.isDead();});
  hearts=hearts.filter(h=>{h.update();h.draw();return !h.isOut();});
  animId=requestAnimationFrame(gameLoop);
}
function startGame() {
  resizeCanvas(); score=0; hearts=[]; planes=[]; particles=[]; gameActive=true;
  document.getElementById('scoreText').textContent='0';
  gameLoop();
  canvas.addEventListener('click', onGameClick);
  canvas.addEventListener('touchstart', onGameTouch, {passive:false});
}
function onGameClick(e) {
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const my=(e.clientY-rect.top)*(canvas.height/rect.height);
  checkHeartHit(mx,my);
}
function onGameTouch(e) {
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const t=e.touches[0];
  const mx=(t.clientX-rect.left)*(canvas.width/rect.width);
  const my=(t.clientY-rect.top)*(canvas.height/rect.height);
  checkHeartHit(mx,my);
}
function checkHeartHit(mx,my) {
  for (let i=hearts.length-1;i>=0;i--) {
    const h=hearts[i];
    const dx=mx-h.x, dy=my-h.y;
    if (Math.sqrt(dx*dx+dy*dy)<h.size*1.5) {
      spawnParticles(h.x,h.y,h.color);
      hearts.splice(i,1); score++;
      document.getElementById('scoreText').textContent=score;
      playHeartCatch();
      createSoundRing(h.x+canvas.getBoundingClientRect().left, h.y+canvas.getBoundingClientRect().top);
      if (score>=16) {
        gameActive=false; cancelAnimationFrame(animId);
        canvas.removeEventListener('click',onGameClick);
        canvas.removeEventListener('touchstart',onGameTouch);
        playSuccess();
        setTimeout(()=>transitionTo('screen-game','screen-messages',()=>{ initMessages(); }), 800);
      }
      break;
    }
  }
}
function createSoundRing(x,y) {
  const ring=document.createElement('div');
  ring.className='sound-ring';
  const size=40;
  ring.style.cssText=`left:${x-size/2}px;top:${y-size/2}px;width:${size}px;height:${size}px;`;
  document.body.appendChild(ring);
  setTimeout(()=>ring.remove(),700);
}

  },

    btn: "",
    hasYN: true,
    ynQuestion: "Apakah kamu siap untuk membaca lebih lanjut?"
  },
  {

    text: "Abel, at 16 the world is literally yours. Semoga di usia ini kamu makin berani ngejar semua yang kamu mau, even when it feels scary — because the best things in life are always worth the leap.",
    btn: "Masih ada pesannya",
    hasYN: false
  },
  {

  },

  },

    text: "Di usia 16 ini, please be kind to yourself. Love yourself a little more each day — kamu lebih dari cukup, kamu lebih dari layak, and the world is so much brighter with you in it. Happy sweet sixteen, Abel!",
    btn: "Buka pesannya!",
    hasYN: false
  }
];

let currentMsg = 0;
let typewriterTimer = null;

function initMessages() {
  currentMsg = 0;
  const dotsWrap = document.getElementById('progressDots');
  dotsWrap.innerHTML = '';
  messages.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'dot'+(i===0?' active':'');
    dotsWrap.appendChild(d);
  });
  dotsWrap.classList.add('visible');
  showMessage(0);
}

function typewriterText(el, fullText, speed, onDone) {
  if (typewriterTimer) clearInterval(typewriterTimer);
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'msg-cursor';
  el.appendChild(cursor);
  let i = 0;
  typewriterTimer = setInterval(()=>{
    if (i < fullText.length) {
      el.insertBefore(document.createTextNode(fullText[i]), cursor);
      i++;
      if (i%6===0) playTypingSound();
    } else {
      clearInterval(typewriterTimer);
      setTimeout(()=>{ cursor.style.opacity='0'; if(onDone) onDone(); }, 800);
    }
  }, speed);
}

function showMessage(idx) {
  const m = messages[idx];
  const deco = document.getElementById('msgDeco');
  const text = document.getElementById('msgText');
  const btn = document.getElementById('nextBtn');
  const ynWrap = document.getElementById('ynWrap');

  showCharacter(idx);

  deco.classList.remove('visible');
  text.innerHTML = '';
  btn.classList.remove('visible');
  ynWrap.classList.remove('visible');
  ynWrap.style.display = 'none';

  setTimeout(()=>{ deco.textContent = m.deco; deco.classList.add('visible'); }, 100);

  setTimeout(()=>{
    const speed = Math.max(22, Math.min(50, Math.round(3800/m.text.length)));
    typewriterText(text, m.text, speed, ()=>{
      if (m.hasYN) {
        // Show Y/N question below text
        const qEl = document.createElement('div');
        qEl.className = 'msg-deco';
        qEl.style.marginTop = '20px';
        qEl.style.opacity = '0';
        qEl.style.animation = 'decoIn 0.6s cubic-bezier(.22,1,.36,1) both';
        qEl.textContent = m.ynQuestion;
        text.parentNode.insertBefore(qEl, ynWrap);
        setTimeout(()=>{ qEl.style.opacity='1'; }, 50);
        ynWrap.style.display = 'flex';
        setTimeout(()=>ynWrap.classList.add('visible'), 100);
      } else {
        btn.textContent = m.btn;
        btn.classList.add('visible');
      }
    });
  }, 400);

  const dots = document.querySelectorAll('.dot');
  dots.forEach((d,i)=>{
    d.className='dot';
    if(i<idx) d.classList.add('done');
    if(i===idx) d.classList.add('active');
  });
}

function playTypingSound() {
  try {
    const ctx = getAudio();
    // Soft click/pop: very short noise burst
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.03, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/data.length, 3) * 0.18;
    }
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1800 + Math.random() * 600;
    filter.Q.value = 0.8;
    src.buffer = buf;
    src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.22, ctx.currentTime);
    src.start(); src.stop(ctx.currentTime + 0.04);
  } catch(e){}
}

function showSmileOverlay() {
  const overlay = document.getElementById('smileOverlay');
  overlay.classList.remove('show');
  void overlay.offsetWidth;
  overlay.classList.add('show');
  setTimeout(()=>overlay.classList.remove('show'), 2000);
}

function answerYes(e) {
  playSuccess();
  createSparkleAt(e.clientX, e.clientY);
  showSmileOverlay();
  // Remove inline question label if any
  const extras = document.querySelectorAll('.msg-content .msg-deco:not(#msgDeco)');
  extras.forEach(el=>el.remove());
  currentMsg++;
  setTimeout(()=>showMessage(currentMsg), 600);
}

function answerNo(e) {
  playWrong();
  createSparkleAt(e.clientX, e.clientY);
  // Show angry emoji animation
  const overlay = document.getElementById('angryOverlay');
  overlay.classList.remove('show');
  void overlay.offsetWidth; // reflow
  overlay.classList.add('show');
  // Remove inline question label
  const extras = document.querySelectorAll('.msg-content .msg-deco:not(#msgDeco)');
  extras.forEach(el=>el.remove());
  // After angry animation, go back to message 2 (idx 1)
  setTimeout(()=>{
    overlay.classList.remove('show');
    showMessage(1);
  }, 1900);
}

function nextMessage(e) {
  playNextMsg();
  createSparkleAt(e.clientX, e.clientY);
  currentMsg++;
  if (currentMsg >= messages.length) {
    transitionTo('screen-messages','screen-final',()=>launchFinal());
  } else {
    showMessage(currentMsg);
  }
}

// ============================================
// FINAL SCREEN
// ============================================
function launchFinal() {
  const title=document.getElementById('finalTitle');
  const sub=document.getElementById('finalSub');
  title.classList.add('visible');
  setTimeout(()=>sub.classList.add('visible'),600);
  setTimeout(launchConfetti,300);
  playSuccess(); setTimeout(()=>playChime(),600);
}
function launchConfetti() {
  const wrap=document.getElementById('confettiWrap');
  const colors=['#1565C0','#42A5F5','#b8e4f9','#f9b8d4','#ffffff','#f5c842','#1976D2'];
  for (let i=0;i<60;i++) {
    const c=document.createElement('div');
    const color=colors[Math.floor(Math.random()*colors.length)];
    const size=6+Math.random()*10, left=Math.random()*100;
    const delay=Math.random()*3, dur=2+Math.random()*3;
    if (Math.random()<0.3) {
      c.style.cssText=`position:absolute;left:${left}%;top:-20px;width:${size}px;height:${size}px;animation:confettiFall ${dur}s ${delay}s ease-in infinite;`;
      c.innerHTML=`<svg viewBox="-1 -1 2 2" style="width:${size}px;height:${size}px;overflow:visible"><path d="${heartPath()}" fill="${color}" opacity="0.8"/></svg>`;
    } else {
      c.style.cssText=`position:absolute;left:${left}%;top:-20px;width:${size}px;height:${size}px;background:${color};border-radius:${Math.random()<0.5?'50%':'3px'};opacity:0.8;animation:confettiFall ${dur}s ${delay}s ease-in infinite;`;
    }
    wrap.appendChild(c);
  }
  const st=document.createElement('style');
  st.textContent=`@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0) translateX(0);opacity:1;}80%{opacity:0.8;}100%{transform:translateY(110vh) rotate(720deg) translateX(${(Math.random()-0.5)*200}px);opacity:0;}}`;
  document.head.appendChild(st);
}
function heartPath() {
  let d='';
  for(let i=0;i<=64;i++){const t=(i/64)*Math.PI*2;const x=16*Math.pow(Math.sin(t),3)/16;const y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))/16;d+=(i===0?'M':'L')+x.toFixed(3)+','+y.toFixed(3);}
  return d+'Z';
}

// ============================================
// TRANSITIONS
// ============================================
function transitionTo(from, to, callback) {
  const fromEl=document.getElementById(from), toEl=document.getElementById(to);
  fromEl.style.opacity='0'; fromEl.style.transform='translateY(-20px)';
  setTimeout(()=>{
    fromEl.classList.add('hidden'); fromEl.style.opacity=''; fromEl.style.transform='';
    toEl.classList.remove('hidden'); toEl.style.opacity='0'; toEl.style.transform='translateY(20px)';
    setTimeout(()=>{
      toEl.style.transition='opacity 0.7s ease, transform 0.7s ease';
      toEl.style.opacity='1'; toEl.style.transform='translateY(0)';
      if (to==='screen-game') startGame();
      if (callback) setTimeout(callback,200);
    },50);
  },600);
}

// ============================================
// SPARKLE EFFECTS
// ============================================
function createSparkleAt(x,y) {
  const colors=['#1565C0','#42A5F5','#f5c842','#f9b8d4'];
  for (let i=0;i<5;i++) {
    const s=document.createElement('div');
    const color=colors[Math.floor(Math.random()*colors.length)];
    const size=6+Math.random()*10, angle=Math.random()*360, dist=20+Math.random()*40;
    const tx=Math.cos(angle*Math.PI/180)*dist, ty=Math.sin(angle*Math.PI/180)*dist;
    s.className='sparkle';
    s.style.cssText=`left:${x-size/2}px;top:${y-size/2}px;width:${size}px;height:${size}px;background:${color};border-radius:50%;--tx:${tx}px;--ty:${ty}px;`;
    const st=document.createElement('style');
    st.textContent=`@keyframes sparkleMove{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}`;
    document.head.appendChild(st);
    s.style.animation='sparkleMove 0.6s ease forwards';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),700);
  }
}

// ============================================

window.addEventListener('resize',()=>{ if(gameActive) resizeCanvas(); });
